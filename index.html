<body onload="init()">

    <main>

            <h1 class="HideMobile410 PaddingLeftRight">Elenas & Michis Reisefotos</h1>

                <h2>Elba</h2>

            <section class="SectionPhotoGallery">
                <h2>Weitere Orte</h2>
                <!-- Container-id must be identical to foldername AND key in photos.js-file !! -->
                <div class="ImageContainerPhotoGallery"
                    id="other">
                </div>
            </section>
        </div>

        <dialog id="#DialogPhotoOverlay" closedby="any">
            <div 
                class="ContainerDialog"
                id="#PhotoOverlay">
            </div>
        </dialog>
